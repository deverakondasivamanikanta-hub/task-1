<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* three selectors */
        /* tag name */
        h2{
            color: rgb(230, 24, 24);
            background-color: rgb(54, 29, 181);
            text-align: center;
            font-size: medium;
        }
        /* id name */
        #myid{
            background-color: rgb(218, 58, 119);
            color: rgb(219, 137, 14);
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-style: italic;
        }
        .myclass{
            background-color: rgb(8, 185, 123);
        }
        #b{
            /* box model */
            border-color: rgb(18, 186, 18);
            border-style: dotted;
            border-width: 8px;
            padding-top: 10px;
            margin: 20px;
            border-radius: 120px;
        }   
        body{
            background-color: rgb(97, 193, 231);
            background-size: cover;
        }
    </style>
</head>
<body>
    <!--inline-->
    <h1"style ="background-color: rgb(35, 35, 199);color: rgb(79, 208, 208);text-align: center;font-size: larger;font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif; letter-spacing: normal;">welcomeall"</h1> 
    <!--internal css-->
    <h2 id="b">inline css</h2>
    <h2 id ="myid b">internal css</h2>
    <h2 class = "myclass" id="b">external</h2>
</body>
</html>
